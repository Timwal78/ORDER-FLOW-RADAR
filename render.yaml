services:
  - type: web
    name: s3-decision-engine
    env: docker
    plan: free
    region: ohio
    envVars:
      # Core
      - key: PORT
        value: "8000"
      - key: HOST
        value: 0.0.0.0

      # Secrets (set manually in Render dashboard)
      - key: DISCORD_WEBHOOK_URL
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false

      # Intelligence
      - key: CLAUDE_MODEL
        value: claude-3-haiku-20240307

      # Scoring Weights
      - key: S3_MOMENTUM_WEIGHT
        value: "0.4"
      - key: S3_VOLATILITY_WEIGHT
        value: "0.3"
      - key: S3_ANOMALY_WEIGHT
        value: "0.3"

      # Decision Thresholds
      - key: S3_IGNITION_THRESHOLD
        value: "70"
      - key: S3_EXHAUSTION_THRESHOLD
        value: "30"

      # Options Config
      - key: STRIKE_ATR_MULTIPLIER
        value: "1.5"
      - key: DAYS_TO_EXPIRY
        value: "14"
      - key: PRICE_CAP
        value: "50"
      - key: ODTE_TICKERS
        value: "IWM"

      # Risk Management (Lethal Suite)
      - key: RR_RATIO
        value: "3.0"
      - key: ATR_SL_MULTIPLIER
        value: "2.0"
      - key: ATR_TP_MULTIPLIER
        value: "6.0"
      - key: MAX_POSITION_SIZE
        value: "10.0"
      - key: SHARPE_MOMENTUM_WEIGHT
        value: "0.6"

      # Engine Constants
      - key: ATR_PERIOD
        value: "14"
      - key: MOMENTUM_PERIOD
        value: "10"
      - key: ANOMALY_SENSITIVITY
        value: "1.5"
