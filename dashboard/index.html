<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Flow Radar™ | ScriptMasterLabs™</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0c;
            --surface: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
            --gold: #d4af37;
            --gold-bright: #f4cf57;
            --green: #00ffa3;
            --red: #ff3e3e;
            --text-dim: #9ca3af;
            --text-bright: #ffffff;
            --font-main: 'Outfit', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background-color: var(--bg);
            color: var(--text-bright);
            font-family: var(--font-main);
            overflow: hidden;
            height: 100vh;
        }

        .glass {
            background: var(--surface);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 12px;
        }

        /* Layout */
        .app-container {
            display: grid;
            grid-template-areas: 
                "header header"
                "main sidebar";
            grid-template-columns: 1fr 340px;
            grid-template-rows: 70px 1fr;
            height: 100vh;
            padding: 15px;
            gap: 15px;
        }

        header {
            grid-area: header;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
        }

        .logo {
            font-size: 20px;
            font-weight: 800;
            letter-spacing: 1px;
            color: var(--gold);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .system-status {
            display: flex;
            align-items: center;
            gap: 20px;
            font-size: 13px;
            color: var(--text-dim);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--green);
            box-shadow: 0 0 10px var(--green);
        }

        main {
            grid-area: main;
            display: flex;
            flex-direction: column;
            gap: 15px;
            overflow: hidden;
        }

        /* Radar Table */
        .radar-panel {
            flex: 1;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .panel-header {
            padding: 15px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .panel-title {
            font-size: 14px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--gold);
        }

        .table-container {
            flex: 1;
            overflow-y: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        thead th {
            padding: 12px 20px;
            font-size: 11px;
            text-transform: uppercase;
            color: var(--text-dim);
            position: sticky;
            top: 0;
            background: rgba(10, 10, 12, 0.8);
            backdrop-filter: blur(5px);
            z-index: 10;
        }

        tbody tr {
            border-bottom: 1px solid var(--border);
            transition: all 0.2s ease;
        }

        tbody tr:hover {
            background: rgba(255, 255, 255, 0.02);
            transform: scale(1.002);
        }

        td {
            padding: 16px 20px;
            font-size: 14px;
        }

        .symbol-cell { font-weight: 700; color: var(--gold-bright); font-family: var(--font-mono); }
        .price-cell { font-weight: 600; font-family: var(--font-mono); }
        .score-badge {
            padding: 4px 8px;
            border-radius: 4px;
            background: rgba(212, 175, 55, 0.1);
            color: var(--gold);
            font-size: 12px;
            font-weight: 700;
        }

        .action-cell { font-weight: 800; font-size: 12px; }
        .long { color: var(--green); }
        .short { color: var(--red); }

        /* Sidebar Alerts */
        aside {
            grid-area: sidebar;
            display: flex;
            flex-direction: column;
            gap: 15px;
            overflow: hidden;
        }

        .alerts-panel {
            flex: 1;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .alerts-feed {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .alert-card {
            padding: 12px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border);
            border-radius: 8px;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from { transform: translateX(20px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .alert-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 12px;
        }

        .alert-symbol { font-weight: 800; color: var(--gold); }
        .alert-time { color: var(--text-dim); }
        .alert-confs { font-size: 11px; color: var(--text-dim); line-height: 1.4; }

        /* Stats Panel */
        .stats-panel {
            padding: 20px;
            height: 200px;
        }

        .stat-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 15px;
        }

        .stat-item {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .stat-label { font-size: 11px; color: var(--text-dim); text-transform: uppercase; }
        .stat-value { font-size: 18px; font-weight: 700; color: var(--gold-bright); }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--gold); }
    </style>
</head>
<body>
    <div class="app-container">
        <header class="glass">
            <div class="logo">
                <span style="font-size: 24px;">📡</span> ORDER FLOW RADAR™
            </div>
            <div class="system-status">
                <div id="api-status-bar" style="display: flex; gap: 15px; margin-right: 20px; font-size: 11px;">
                    <!-- Injected by JS -->
                </div>
                <div style="display: flex; align-items: center; gap: 8px;">
                    <div class="status-dot"></div>
                    <span>LIVE MARKET DATA</span>
                </div>
                <div id="clock">00:00:00 UTC</div>
            </div>
        </header>

        <main>
            <div class="radar-panel glass">
                <div class="panel-header">
                    <div class="panel-title">Institutional Scanner Results</div>
                    <div id="ticker-count" style="font-size: 12px; color: var(--text-dim);">0 symbols scanned</div>
                </div>
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>Symbol</th>
                                <th>Price</th>
                                <th>Action</th>
                                <th>Score</th>
                                <th>CVD Ratio</th>
                                <th>Volume</th>
                                <th>Spread</th>
                            </tr>
                        </thead>
                        <tbody id="radar-body">
                            <!-- Rows injected by JS -->
                        </tbody>
                    </table>
                </div>
            </div>
        </main>

        <aside>
            <div class="alerts-panel glass">
                <div class="panel-header">
                    <div class="panel-title">Signal Alerts</div>
                </div>
                <div class="alerts-feed" id="alerts-feed">
                    <!-- Cards injected by SSE -->
                </div>
            </div>

            <div class="stats-panel glass">
                <div class="panel-title">System Performance</div>
                <div class="stat-grid">
                    <div class="stat-item">
                        <div class="stat-label">Active Signals</div>
                        <div class="stat-value" id="stat-active">0</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label">Win Rate</div>
                        <div class="stat-value" id="stat-winrate">N/A</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label">Discovery</div>
                        <div class="stat-value" id="stat-discovery">--</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label">CVD Power</div>
                        <div class="stat-value" id="stat-cvd">--</div>
                    </div>
                </div>
            </div>
        </aside>
    </div>

    <script>
        // Update Clock
        setInterval(() => {
            document.getElementById('clock').textContent = new Date().toISOString().split('T')[1].split('.')[0] + ' UTC';
        }, 1000);

        const radarBody = document.getElementById('radar-body');
        const alertsFeed = document.getElementById('alerts-feed');

        const apiStatusBar = document.getElementById('api-status-bar');

        async function updateHealth() {
            try {
                const res = await fetch('/api/health');
                const data = await res.json();
                const health = data.api;
                apiStatusBar.innerHTML = Object.entries(health).map(([key, val]) => {
                    const color = val === 'CONNECTED' || val === 'READY' ? 'var(--green)' : 'var(--red)';
                    return `<div>${key.toUpperCase()}: <span style="color: ${color}">${val}</span></div>`;
                }).join('');
                
                // Update Build Version in stats panel
                let verEl = document.getElementById('system-version');
                if (!verEl) {
                    verEl = document.createElement('div');
                    verEl.id = 'system-version';
                    verEl.style.fontSize = '10px';
                    verEl.style.opacity = '0.5';
                    verEl.style.marginTop = '20px';
                    verEl.style.textAlign = 'center';
                    document.querySelector('.stats-panel').appendChild(verEl);
                }
                verEl.innerText = `BUILD: ${data.version}`;
            } catch (e) {}
        }

        async function updateSnapshot() {
            try {
                const res = await fetch('/api/snapshot');
                const data = await res.json();
                
                radarBody.innerHTML = data.map(s => {
                    const staleStyle = s.is_stale ? 'opacity: 0.3; filter: grayscale(1);' : '';
                    return `
                    <tr style="${staleStyle}">
                        <td class="symbol-cell">${s.symbol}</td>
                        <td class="price-cell">$${s.last_price.toFixed(2)}</td>
                        <td class="action-cell">${s.is_stale ? 'STALE' : '--'}</td>
                        <td><span class="score-badge">${s.is_stale ? 'WAITING' : 'FLOWING'}</span></td>
                        <td class="price-cell">${(s.cvd_ratio * 100).toFixed(0)}%</td>
                        <td class="price-cell">${(s.total_volume / 1000).toFixed(0)}K</td>
                        <td class="price-cell">${s.spread_pct.toFixed(3)}%</td>
                    </tr>
                    `;
                }).join('');
                
                document.getElementById('ticker-count').textContent = `${data.length} symbols active on tape`;
            } catch (e) {}
        }

        // SSE Listener for real-time signals
        const evtSource = new EventSource("/api/stream");
        evtSource.addEventListener("signal", (e) => {
            const sig = JSON.parse(e.data);
            const card = document.createElement('div');
            card.className = 'alert-card';
            const actionClass = sig.action === 'LONG' ? 'long' : 'short';
            
            card.innerHTML = `
                <div class="alert-header">
                    <span class="alert-symbol">${sig.symbol}</span>
                    <span class="alert-time">${sig.fired_at.split('T')[1].slice(0, 5)}</span>
                </div>
                <div style="font-weight: 800; margin-bottom: 5px;" class="${actionClass}">
                    ${sig.action} @ $${sig.price.toFixed(2)}
                </div>
                <div class="alert-confs">
                    ${sig.confluences.join(' • ')}
                </div>
            `;
            
            alertsFeed.prepend(card);
            if (alertsFeed.children.length > 50) alertsFeed.lastChild.remove();
            
            // update stats
            document.getElementById('stat-active').textContent = alertsFeed.children.length;
        });

        // Initialize
        setInterval(updateSnapshot, 5000);
        setInterval(updateHealth, 5000);
        updateSnapshot();
        updateHealth();
    </script>
</body>
</html>
